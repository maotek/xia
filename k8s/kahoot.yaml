apiVersion: v1
kind: Namespace
metadata:
  name: kahoot
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kahoot
  namespace: kahoot
# If the GHCR packages are private, create a ghcr-credentials pull secret and
# uncomment the following lines:
# imagePullSecrets:
#   - name: ghcr-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kahoot-backend
  namespace: kahoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kahoot
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kahoot
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: kahoot
      containers:
        - name: backend
          image: ghcr.io/maotek/kahoot-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: kahoot-backend
  namespace: kahoot
spec:
  selector:
    app.kubernetes.io/name: kahoot
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kahoot-frontend
  namespace: kahoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kahoot
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kahoot
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: kahoot
      containers:
        - name: frontend
          image: ghcr.io/maotek/kahoot-frontend:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: kahoot-frontend
  namespace: kahoot
spec:
  selector:
    app.kubernetes.io/name: kahoot
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kahoot
  namespace: kahoot
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  # Create this secret from an existing certificate and matching private key:
  # kubectl -n kahoot create secret tls kahoot-tls \
  #   --cert=/path/to/tls.crt --key=/path/to/tls.key
  tls:
    - secretName: kahoot-tls
  rules:
    - http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: kahoot-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kahoot-frontend
                port:
                  name: http
