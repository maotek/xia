apiVersion: v1
kind: Namespace
metadata:
  name: kahoot
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: kahoot
spec:
  acme:
    # Optionally add an email address for the Let's Encrypt account:
    # email: you@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kahoot
  namespace: kahoot
# If the GHCR packages are private, create a ghcr-credentials pull secret and
# uncomment the following lines:
# imagePullSecrets:
#   - name: ghcr-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kahoot-backend
  namespace: kahoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kahoot
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kahoot
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: kahoot
      containers:
        - name: backend
          image: ghcr.io/maotek/kahoot-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: kahoot-backend
  namespace: kahoot
spec:
  selector:
    app.kubernetes.io/name: kahoot
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kahoot-frontend
  namespace: kahoot
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kahoot
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kahoot
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: kahoot
      containers:
        - name: frontend
          image: ghcr.io/maotek/kahoot-frontend:latest
          imagePullPolicy: Always
          env:
            - name: SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: kahoot-frontend
  namespace: kahoot
spec:
  selector:
    app.kubernetes.io/name: kahoot
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kahoot
  namespace: kahoot
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - xiaxia23bday.maotek.nl
      secretName: kahoot-tls
  rules:
    - host: xiaxia23bday.maotek.nl
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: kahoot-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kahoot-frontend
                port:
                  name: http
